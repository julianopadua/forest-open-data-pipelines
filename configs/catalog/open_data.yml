# configs/catalog/open_data.yml
#
# Presentation metadata for the open-data catalog consumed by the portal.
# The pipeline `publish-catalog` command reads this file and uploads a single
# consolidated JSON to Supabase Storage
# (catalog/open_data_catalog.json).
#
# Schema stability: this file is the SSOT for the open-data catalog UI.
# Adding a dataset here + registering its runner is the canonical flow.
