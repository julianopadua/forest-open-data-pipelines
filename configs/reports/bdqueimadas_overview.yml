# configs/reports/bdqueimadas_overview.yml
id: bdqueimadas_overview

title:
  pt: "BDQueimadas - Panorama Sintético de Focos"
  en: "BDQueimadas - Synthetic Hotspot Overview"

bucket_prefix: reports/bdqueimadas/overview

source_label:
  pt: "INPE - Programa Queimadas"
  en: "INPE - Queimadas Program"

summary:
  pt: >
    Report leve para publicação web, baseado em agregações do BDQueimadas.
    O objetivo é expor tendências e comparações descritivas sem enviar a base bruta ao frontend.
  en: >
    Lightweight report for web publication, based on BDQueimadas aggregations.
    The goal is to expose descriptive trends and comparisons without sending the raw dataset to the frontend.

dataset:
  dataset_id: inpe_bdqueimadas_focos
  local_relative_dir: inpe_bdqueimadas
  file_glob: "focos_br_ref_*.zip"
  recent_years: 10

columns:
  datetime_candidates:
    - data_pas
    - data_hora_gmt
    - data_hora
    - datahora
    - data
    - date
  state_candidates:
    - estado
    - uf
    - estado_sigla
    - state

display:
  monthly_points: 24
  annual_years: 8
  top_states_limit: 10

editorial:
  publish_generated_as_live: true
  overrides_file: configs/reports/overrides/bdqueimadas_overview.live.yml

llm:
  enabled: true
  provider: groq
  model: null
  max_chars_per_block: 700