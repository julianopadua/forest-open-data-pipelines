<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verde · Capa</title>
  <link rel="stylesheet" href="../../src/style.css" />
  <link rel="stylesheet" href="../../src/green/theme.css" />
</head>
<body>
  <div class="canvas-scaler">
    <div id="card" class="post-canvas grid-cross" style="background-color: var(--bg);">

      <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-12 pt-10">
        <span class="text-xs tracking-widest uppercase font-semibold" style="color: var(--accent);" data-slot="topic_tag">
          <!-- slot: topic_tag -->
          Queimadas &amp; Clima
        </span>
        <span class="text-xs" style="color: var(--text-muted);" data-slot="published_at">
          <!-- slot: published_at -->
          Abr 2026
        </span>
      </div>

      <div class="absolute top-16 left-12 w-0.5 h-24" style="background: var(--accent); opacity: 0.6;"></div>

      <div class="absolute flex flex-col items-end text-right"
           style="top: 220px; right: 48px; width: 520px;">
        <p class="text-sm font-semibold mb-4 tracking-widest uppercase" style="color: var(--accent);" data-slot="series_label">
          <!-- slot: series_label -->
          Análise de dados
        </p>
        <h1 class="font-black leading-none" style="font-size: 96px; color: var(--text-primary); letter-spacing: -2px;" data-slot="title">
          <!-- slot: title -->
          Seca prolonga&shy;da aumenta risco de queima&shy;das
        </h1>
      </div>

      <div class="absolute left-0 right-0 h-px" style="top: 675px; background: var(--accent-muted);"></div>

      <div class="absolute" style="bottom: 220px; left: 48px; width: 520px;">
        <p class="leading-relaxed" style="font-size: 34px; color: var(--text-secondary);" data-slot="summary">
          <!-- slot: summary -->
          Meteorologia indica baixa umidade em várias regiões e alerta para aumento no número de focos ativos no território nacional.
        </p>
      </div>

      <div class="absolute bottom-0 left-0 right-0 flex items-end justify-between px-12 pb-10">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-sm" style="background: var(--accent);"></div>
          <span class="text-sm font-bold tracking-widest uppercase" style="color: var(--text-primary);" data-slot="brand_name">
            <!-- slot: brand_name -->
            ForestLab
          </span>
        </div>
        <span class="text-sm font-medium tabular-nums" style="color: var(--accent);" data-slot="card_number">
          <!-- slot: card_number -->
          01 / 05
        </span>
      </div>

      <div class="absolute bottom-0 left-0 right-0 h-1" style="background: var(--accent);"></div>

    </div>
  </div>

  <script type="module">
    import { initFitCanvas } from "../../src/green/fit-canvas.js";
    import { applySlotsFromQuery } from "../../src/green/slots.js";
    initFitCanvas();
    applySlotsFromQuery();
  </script>
</body>
</html>
