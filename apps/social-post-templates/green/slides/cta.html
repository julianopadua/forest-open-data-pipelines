<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verde · CTA</title>
  <link rel="stylesheet" href="../../src/style.css" />
  <link rel="stylesheet" href="../../src/green/theme.css" />
</head>
<body>
  <div class="canvas-scaler">
    <div id="card" class="post-canvas grid-cross" style="background-color: var(--bg);">

      <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-12 pt-10">
        <span class="text-xs tracking-widest uppercase font-semibold" style="color: var(--accent);" data-slot="topic_tag">
          <!-- slot: topic_tag -->
          Queimadas &amp; Clima
        </span>
        <span class="text-xs" style="color: var(--text-muted);" data-slot="published_at">
          <!-- slot: published_at -->
          Abr 2026
        </span>
      </div>

      <div class="absolute left-12 right-12 flex flex-col items-center text-center justify-center"
           style="top: 200px; bottom: 200px;">
        <p class="text-sm font-semibold mb-6 tracking-widest uppercase" style="color: var(--accent);" data-slot="cta_kicker">
          <!-- slot: cta_kicker -->
          Continua acompanhando
        </p>
        <h2 class="font-black leading-tight mb-10 px-4" style="font-size: 64px; color: var(--text-primary); letter-spacing: -1px;" data-slot="cta_headline">
          <!-- slot: cta_headline -->
          Gostou do conteúdo?
        </h2>
        <p class="leading-relaxed max-w-xl mb-6" style="font-size: 28px; color: var(--text-secondary);" data-slot="cta_subline">
          <!-- slot: cta_subline -->
          Acesse o site do instituto para mais análises, dados abertos e atualizações.
        </p>
        <p class="text-lg font-semibold break-all px-4" style="color: var(--accent);" data-slot="cta_url">
          <!-- slot: cta_url -->
          www.instituto-exemplo.org
        </p>
      </div>

      <div class="absolute bottom-0 left-0 right-0 flex items-end justify-between px-12 pb-10">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-sm" style="background: var(--accent);"></div>
          <span class="text-sm font-bold tracking-widest uppercase" style="color: var(--text-primary);" data-slot="brand_name">
            <!-- slot: brand_name -->
            ForestLab
          </span>
        </div>
        <span class="text-sm font-medium tabular-nums" style="color: var(--accent);" data-slot="card_number">
          <!-- slot: card_number -->
          05 / 05
        </span>
      </div>

      <div class="absolute bottom-0 left-0 right-0 h-1" style="background: var(--accent);"></div>

    </div>
  </div>

  <script type="module">
    import { initFitCanvas } from "../../src/green/fit-canvas.js";
    import { applySlotsFromQuery } from "../../src/green/slots.js";
    initFitCanvas();
    applySlotsFromQuery();
  </script>
</body>
</html>
