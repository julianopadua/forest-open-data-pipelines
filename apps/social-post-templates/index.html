<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Post Templates</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body style="background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif;">
  <div style="text-align: center; max-width: 640px; padding: 2rem;">
    <h1 style="font-size: 2rem; font-weight: 900; color: #0f172a; margin-bottom: 0.5rem;">
      Social Post Templates
    </h1>
    <p style="color: #64748b; margin-bottom: 2.5rem; font-size: 1rem;">
      Escolha um tema para visualizar o template de post.
    </p>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <a href="/green/index.html" style="display: block; padding: 1rem 1.5rem; border-radius: 0.75rem; background: #0B3D2E; color: #2ECC9A; font-weight: 700; text-decoration: none; font-size: 1.1rem;">
        Verde (Forest)
      </a>
      <a href="/navy/index.html" style="display: block; padding: 1rem 1.5rem; border-radius: 0.75rem; background: #0D1B2E; color: #4A9EFF; font-weight: 700; text-decoration: none; font-size: 1.1rem;">
        Azul Marinho (Ocean)
      </a>
      <a href="/white/index.html" style="display: block; padding: 1rem 1.5rem; border-radius: 0.75rem; background: #FFFFFF; border: 2px solid #0B7B56; color: #0B7B56; font-weight: 700; text-decoration: none; font-size: 1.1rem;">
        Branco (Clean)
      </a>
    </div>
    <p style="margin-top: 2rem; font-size: 0.8rem; color: #94a3b8;">
      Canvas fixo 1080 × 1350 px · Texto Lorem para design review
    </p>
  </div>
