name: Daily Freshness Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

jobs:
  freshness-watch:
    runs-on: ubuntu-latest
    env:
      FOREST_POLITE_EMAIL: ${{ vars.FOREST_POLITE_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run freshness watch
        run: |
          forest-pipelines freshness watch --config configs/freshness/watch.yml
          forest-pipelines freshness classify-presets --config configs/freshness/watch.yml --out data/freshness_watch/classification.csv
          forest-pipelines freshness report --format md --out data/freshness_watch/reports/social_cadence.md

      - name: Upload freshness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freshness-watch
          path: |
            data/freshness_watch/observations.csv
            data/freshness_watch/latest.json
            data/freshness_watch/classification.csv
            data/freshness_watch/reports/social_cadence.md
